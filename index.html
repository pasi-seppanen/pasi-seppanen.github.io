<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasi Seppanen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #6ee7b7;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    header {
      margin-bottom: 3rem;
    }

    .name {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: normal;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    .name span {
      color: var(--accent);
    }

    .tagline {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: var(--muted);
      font-style: italic;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 2.5rem 0;
    }

    .bio {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #ccc;
    }

    .links {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .links a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    footer {
      margin-top: 5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--border);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="name">Pasi<span>.</span></h1>
      <p class="tagline">seppanen.eu</p>
    </header>

    <div class="divider"></div>

    <p class="bio">
      Welcome to my corner of the internet.
    </p>

    <nav class="links">
      <a href="mailto:pasi@seppanen.eu">Email</a>
      <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
    </nav>

    <footer>seppanen.eu</footer>
  </div>
</body>
</html>
